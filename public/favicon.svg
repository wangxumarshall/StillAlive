<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4AF37"/>
      <stop offset="100%" style="stop-color:#B8962E"/>
    </linearGradient>
  </defs>
  <circle cx="50" cy="50" r="45" fill="#0C0A14"/>
  <circle cx="50" cy="50" r="40" fill="none" stroke="url(#grad)" stroke-width="3"/>
  <text x="50" y="62" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#EAEAEA">W</text>
  <circle cx="50" cy="50" r="3" fill="#D4AF37">
    <animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="10s" repeatCount="indefinite"/>
  </circle>
</svg>
